<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Cryprice favicon</title>
  <desc>Minimal Web3 price and alerts logo for Cryprice</desc>

  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151B24"/>
      <stop offset="1" stop-color="#05080D"/>
    </linearGradient>

    <linearGradient id="ring" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8EEF5"/>
      <stop offset="0.42" stop-color="#7E8794"/>
      <stop offset="1" stop-color="#D7DEE8"/>
    </linearGradient>

    <linearGradient id="mark" x1="184" y1="168" x2="328" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C4C9D4"/>
    </linearGradient>

    <filter id="softShadow" x="36" y="36" width="440" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Main badge -->
  <circle cx="256" cy="256" r="208" fill="url(#ring)"/>
  <circle cx="256" cy="256" r="190" fill="url(#bg)" filter="url(#softShadow)"/>
  <circle cx="256" cy="256" r="190" stroke="#263241" stroke-width="4"/>

  <!-- Circular exchange arrows -->
  <path d="M158 192C181 153 220 130 264 130" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
  <path d="M264 130L238 105L300 109L286 169L264 130Z" fill="#FFFFFF"/>

  <path d="M354 320C331 359 292 382 248 382" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
  <path d="M248 382L274 407L212 403L226 343L248 382Z" fill="#FFFFFF"/>

  <!-- Price data nodes -->
  <circle cx="256" cy="118" r="42" fill="#6B7280" stroke="#FFFFFF" stroke-width="8"/>
  <text x="256" y="137" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#FFFFFF">₿</text>

  <circle cx="394" cy="256" r="42" fill="#3F3F46" stroke="#FFFFFF" stroke-width="8"/>
  <text x="394" y="273" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF">₮</text>

  <circle cx="256" cy="394" r="42" fill="#52525B" stroke="#FFFFFF" stroke-width="8"/>
  <path d="M256 348L229 394L256 410L283 394L256 348Z" fill="#F6F8FB"/>
  <path d="M256 348V410L283 394L256 348Z" fill="#BFC8D8"/>
  <path d="M229 401L256 439L283 401L256 417L229 401Z" fill="#F6F8FB"/>
  <path d="M256 417V439L283 401L256 417Z" fill="#BFC8D8"/>

  <circle cx="118" cy="256" r="42" fill="#71717A" stroke="#FFFFFF" stroke-width="8"/>
  <path d="M100 280H123L157 220C160 215 157 209 151 209H133L100 268C97 273 94 280 100 280Z" fill="#FFFFFF"/>
  <path d="M145 280H168C174 280 177 273 174 268L162 247L145 280Z" fill="#FFFFFF"/>

  <!-- Central brand mark -->
  <circle cx="256" cy="256" r="78" fill="#070B11" stroke="#293545" stroke-width="4"/>
  <text x="256" y="291" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="126" font-weight="800" fill="url(#mark)">C</text>

  <!-- Alert / security shield -->
  <path d="M394 72C423 72 440 58 440 58C440 58 457 72 486 72V137C486 180 440 201 440 201C440 201 394 180 394 137V72Z" fill="#111820" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round"/>
  <path d="M417 128L434 145L465 107" stroke="#E8EAEF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
